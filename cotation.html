<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cotation - Téléchargement Fixe</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            500: '#0ea5e9',
                            600: '#0284c7',
                        }
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { 
            background-color: #f3f4f6; 
            color: #1f2937; 
            overflow: hidden; 
            height: 100dvh; /* Hauteur dynamique mobile */
            width: 100vw;
        }
        
        .scrollable-content {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            height: 100%;
        }

        #sidebar { transition: transform 0.3s ease-in-out; }
        #main-preview { transition: opacity 0.3s ease-in-out; }

        #quote-card {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        input[type="file"] { display: none; }

        #toast {
            visibility: hidden; min-width: 250px; background-color: #333; color: #fff;
            text-align: center; border-radius: 8px; padding: 16px; position: fixed;
            z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%);
            opacity: 0; transition: opacity 0.3s;
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    </style>
</head>
<body class="h-dvh w-full flex relative">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-full md:w-80 lg:w-96 bg-white border-r border-gray-200 flex flex-col h-full z-50 md:z-20 fixed md:relative shadow-xl md:shadow-none">
        <div class="p-5 border-b border-gray-100 flex justify-between items-center flex-shrink-0">
            <h1 class="text-xl font-serif font-bold text-gray-800 flex items-center gap-2">
                <i class="fa-solid fa-quote-left text-brand-500"></i> Cotation
            </h1>
        </div>

        <div class="flex-1 overflow-hidden relative w-full">
            <div class="scrollable-content p-5 space-y-6 pb-32 md:pb-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Format</label>
                    <div class="grid grid-cols-2 gap-2 bg-gray-100 p-1 rounded-lg">
                        <button id="ratio-1-1" class="py-2 rounded-md text-xs font-bold transition-colors bg-white shadow-sm text-gray-900" onclick="setRatio('1:1')">1:1 (Carré)</button>
                        <button id="ratio-9-16" class="py-2 rounded-md text-xs font-bold transition-colors text-gray-500 hover:text-gray-900" onclick="setRatio('9:16')">9:16 (Story)</button>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Citation</label>
                        <textarea id="input-quote" rows="3" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none resize-none text-sm bg-gray-50 focus:bg-white transition-colors" placeholder="Votre citation ici..."></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Auteur</label>
                            <input type="text" id="input-author" class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm" placeholder="Nom">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Fonction</label>
                            <input type="text" id="input-role" class="w-full p-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm" placeholder="Titre">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Photo</label>
                    <div class="flex gap-2">
                        <label class="flex-1 cursor-pointer bg-gray-50 border border-gray-200 hover:border-brand-500 hover:bg-brand-50 text-gray-600 py-2.5 rounded-xl transition-all text-xs font-semibold text-center flex items-center justify-center gap-2">
                            <i class="fa-solid fa-upload"></i> Uploader
                            <input type="file" id="input-image" accept="image/*">
                        </label>
                        <button id="btn-remove-image" class="px-3 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 hidden transition-colors">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Style</label>
                    <div class="flex gap-3 flex-wrap" id="theme-selector">
                        <button class="w-8 h-8 rounded-full bg-white border border-gray-300 ring-2 ring-brand-500 ring-offset-1" data-bg="white" data-text="gray-900"></button>
                        <button class="w-8 h-8 rounded-full bg-slate-900 border border-transparent" data-bg="slate-900" data-text="white"></button>
                        <button class="w-8 h-8 rounded-full bg-gradient-to-br from-violet-600 to-indigo-600 border border-transparent" data-bg="gradient-purple" data-text="white"></button>
                        <button class="w-8 h-8 rounded-full bg-gradient-to-br from-orange-400 to-rose-500 border border-transparent" data-bg="gradient-sunset" data-text="white"></button>
                        <button class="w-8 h-8 rounded-full bg-stone-100 border border-transparent" data-bg="stone-100" data-text="stone-900"></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="md:hidden p-5 border-t border-gray-200 bg-gray-50 absolute bottom-0 w-full z-10">
            <button onclick="showPreview()" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-eye"></i> Voir l'aperçu
            </button>
        </div>
    </aside>

    <!-- MAIN PREVIEW -->
    <main id="main-preview" class="flex-1 relative flex flex-col items-center justify-center bg-gray-200 p-4 md:p-10 overflow-hidden hidden md:flex w-full h-full">
        
        <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-center md:hidden z-10">
            <button onclick="showEditor()" class="bg-white/90 backdrop-blur text-gray-700 px-4 py-2 rounded-full shadow-md font-bold text-sm flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Modifier
            </button>
            <span class="bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-mono text-gray-500 shadow-sm">Aperçu</span>
        </div>

        <div id="preview-container" class="relative w-full max-w-[500px] aspect-square shadow-2xl rounded-2xl overflow-hidden bg-white transition-all duration-300 my-10 md:my-0 bg-white">
            <div id="quote-card">
                <div class="absolute top-0 right-0 p-8 opacity-10 pointer-events-none mix-blend-overlay">
                    <i class="fa-solid fa-quote-right text-8xl md:text-9xl"></i>
                </div>
                <div class="relative z-10 flex-1 flex flex-col justify-center p-8 md:p-12">
                    <p id="display-quote" class="font-serif text-2xl md:text-4xl leading-tight font-medium break-words"></p>
                </div>
                <div class="relative z-10 p-6 md:p-8 flex items-center gap-4 md:gap-6 mt-auto bg-black/5 backdrop-blur-sm">
                    <div class="relative w-16 h-16 md:w-20 md:h-20 flex-shrink-0 rounded-full overflow-hidden bg-gray-300 border-2 border-white/50 shadow-md">
                        <img id="display-image" src="" class="w-full h-full object-cover hidden">
                        <div id="image-placeholder" class="absolute inset-0 flex items-center justify-center text-gray-400">
                            <i class="fa-solid fa-user text-2xl"></i>
                        </div>
                    </div>
                    <div class="flex flex-col overflow-hidden">
                        <span id="display-author" class="text-lg md:text-xl font-bold font-sans uppercase truncate leading-tight">Auteur</span>
                        <span id="display-role" class="text-sm md:text-base font-sans opacity-80 truncate">Fonction</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 md:hidden z-20 w-11/12">
            <button id="btn-download" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-3 px-4 rounded-xl shadow-2xl flex items-center justify-center gap-2 transition-transform active:scale-95">
                <i class="fa-solid fa-download"></i> Télécharger
            </button>
        </div>

        <div class="hidden md:block absolute top-4 right-4">
            <button id="btn-download-desktop" class="bg-white hover:bg-gray-50 text-gray-800 font-bold py-2 px-4 rounded-lg shadow-md border border-gray-200 flex items-center gap-2 text-sm transition-all">
                <i class="fa-solid fa-download"></i> Télécharger
            </button>
        </div>
    </main>

    <div id="toast">Notification</div>

    <script>
        const CONFIG = { storageKey: 'cotation_v6' };
        let state = {
            quote: "Le design n'est pas seulement ce à quoi il ressemble. Le design est comment ça marche.",
            author: "Steve Jobs",
            role: "Co-fondateur d'Apple",
            image: null, ratio: '1:1',
            theme: { bg: 'bg-white', text: 'text-gray-900', isGradient: false, gradientCss: '' }
        };
        const els = {
            sidebar: document.getElementById('sidebar'), main: document.getElementById('main-preview'),
            inputs: { quote: document.getElementById('input-quote'), author: document.getElementById('input-author'), role: document.getElementById('input-role'), image: document.getElementById('input-image') },
            displays: { quote: document.getElementById('display-quote'), author: document.getElementById('display-author'), role: document.getElementById('display-role'), image: document.getElementById('display-image'), placeholder: document.getElementById('image-placeholder'), card: document.getElementById('quote-card'), container: document.getElementById('preview-container') },
            controls: { removeImg: document.getElementById('btn-remove-image'), ratio11: document.getElementById('ratio-1-1'), ratio916: document.getElementById('ratio-9-16'), themes: document.querySelectorAll('#theme-selector button'), downloadBtns: document.querySelectorAll('#btn-download, #btn-download-desktop') },
            toast: document.getElementById('toast')
        };

        document.addEventListener('DOMContentLoaded', () => {
            loadState(); bindEvents(); render();
            if(window.innerWidth < 768) showEditor(); 
        });

        function showPreview() {
            if (window.innerWidth < 768) {
                els.sidebar.classList.add('hidden');
                els.main.classList.remove('hidden'); els.main.classList.add('flex');
            }
        }
        function showEditor() {
            if (window.innerWidth < 768) {
                els.main.classList.add('hidden'); els.main.classList.remove('flex');
                els.sidebar.classList.remove('hidden');
            }
        }

        function bindEvents() {
            ['quote', 'author', 'role'].forEach(key => {
                els.inputs[key].addEventListener('input', (e) => { state[key] = e.target.value; saveState(); render(); });
            });
            els.inputs.image.addEventListener('change', handleImageUpload);
            els.controls.removeImg.addEventListener('click', () => { state.image = null; saveState(); render(); showToast("Image supprimée"); });
            els.controls.themes.forEach(btn => { btn.addEventListener('click', () => applyTheme(btn)); });
            els.controls.downloadBtns.forEach(btn => { btn.onclick = captureAndDownload; });
        }

        function setRatio(ratio) {
            state.ratio = ratio;
            if(ratio === '1:1') {
                els.controls.ratio11.className = "py-2 rounded-md text-xs font-bold transition-colors bg-white shadow-sm text-gray-900";
                els.controls.ratio916.className = "py-2 rounded-md text-xs font-bold transition-colors text-gray-500 hover:text-gray-900";
                els.displays.container.classList.remove('aspect-[9/16]'); els.displays.container.classList.add('aspect-square');
            } else {
                els.controls.ratio11.className = "py-2 rounded-md text-xs font-bold transition-colors text-gray-500 hover:text-gray-900";
                els.controls.ratio916.className = "py-2 rounded-md text-xs font-bold transition-colors bg-white shadow-sm text-gray-900";
                els.displays.container.classList.remove('aspect-square'); els.displays.container.classList.add('aspect-[9/16]');
            }
            saveState();
        }

        function applyTheme(btn) {
            const bg = btn.getAttribute('data-bg'); const txt = btn.getAttribute('data-text');
            els.controls.themes.forEach(b => b.classList.remove('ring-2', 'ring-brand-500', 'ring-offset-1'));
            btn.classList.add('ring-2', 'ring-brand-500', 'ring-offset-1');
            state.theme = { bg: bg.startsWith('gradient') ? 'transparent' : `bg-${bg}`, text: `text-${txt}`, isGradient: bg.startsWith('gradient') };
            if (state.theme.isGradient) {
                if (bg === 'gradient-purple') state.theme.gradientCss = 'linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%)';
                if (bg === 'gradient-sunset') state.theme.gradientCss = 'linear-gradient(135deg, #fb923c 0%, #f43f5e 100%)';
            } else { state.theme.gradientCss = ''; }
            saveState(); render();
        }

        function render() {
            els.displays.quote.innerText = state.quote || "Votre citation...";
            els.displays.author.innerText = state.author || "Auteur";
            els.displays.role.innerText = state.role || "Fonction";
            els.inputs.quote.value = state.quote; els.inputs.author.value = state.author; els.inputs.role.value = state.role;
            if (state.image) {
                els.displays.image.src = state.image; els.displays.image.classList.remove('hidden');
                els.displays.placeholder.classList.add('hidden'); els.controls.removeImg.classList.remove('hidden');
            } else {
                els.displays.image.src = ""; els.displays.image.classList.add('hidden');
                els.displays.placeholder.classList.remove('hidden'); els.controls.removeImg.classList.add('hidden');
            }
            const card = els.displays.card;
            card.className = `flex flex-col justify-between relative overflow-hidden transition-all duration-300 ${state.theme.text}`;
            if (state.theme.isGradient) { card.style.background = state.theme.gradientCss; }
            else { card.style.background = ''; card.classList.add(state.theme.bg); }
            if(state.ratio === '9:16' && !els.displays.container.classList.contains('aspect-[9/16]')) setRatio('9:16');
        }

        function handleImageUpload(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); const maxSize = 800;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > maxSize) { h *= maxSize / w; w = maxSize; } }
                    else { if (h > maxSize) { w *= maxSize / h; h = maxSize; } }
                    canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                    state.image = canvas.toDataURL('image/jpeg', 0.85); saveState(); render(); showToast("Image ajoutée");
                }; img.src = event.target.result;
            }; reader.readAsDataURL(file);
        }

        // --- FONCTION DE TÉLÉCHARGEMENT ROBUSTE ---
        async function captureAndDownload() {
            const btns = Array.from(els.controls.downloadBtns);
            const originalTexts = btns.map(b => b.innerHTML);
            
            btns.forEach(b => { 
                b.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>...`; 
                b.disabled = true; 
            });

            try {
                const elementToCapture = els.displays.container;
                
                // On s'assure que toutes les images internes sont chargées
                const canvas = await html2canvas(elementToCapture, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: null,
                    logging: false,
                    // Important pour les polices Google Fonts :
                    onclone: (clonedDoc) => {
                        const el = clonedDoc.getElementById('preview-container');
                        el.style.transform = "none"; // Évite les bugs de décalage
                    }
                });

                // Conversion en image
                const dataUrl = canvas.toDataURL("image/png");
                
                // Création d'un lien invisible pour forcer le téléchargement
                const link = document.createElement('a');
                const filename = `citation-${(state.author || 'export').replace(/\s+/g, '-').toLowerCase()}.png`;
                
                link.href = dataUrl;
                link.download = filename;
                
                // Ajout au DOM indispensable pour certains navigateurs mobiles
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                showToast("Image téléchargée !");

            } catch (err) {
                console.error("Erreur capture:", err);
                showToast("Erreur lors de la génération");
            } finally {
                btns.forEach((b, index) => { 
                    b.innerHTML = originalTexts[index]; 
                    b.disabled = false; 
                });
            }
        }

        function saveState() { localStorage.setItem(CONFIG.storageKey, JSON.stringify(state)); }
        function loadState() {
            const saved = localStorage.getItem(CONFIG.storageKey);
            if (saved) { try { state = { ...state, ...JSON.parse(saved) }; } catch (e) {} }
        }
        function showToast(msg) {
            els.toast.innerText = msg; els.toast.classList.add('show');
            setTimeout(() => els.toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
