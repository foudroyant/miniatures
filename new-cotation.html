<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotation - Connexion n8n</title>
    <style>
        :root {
            --primary-color: #ea4b71; /* Une couleur un peu plus "n8n" */
            --primary-hover: #d43d60;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-radius: 12px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* En-tête */
        header {
            background: var(--card-bg);
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Layout Principal */
        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        @media (max-width: 850px) {
            main { grid-template-columns: 1fr; }
        }

        /* Panneau Formulaire */
        .control-panel {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            height: fit-content;
            border: 1px solid #e2e8f0;
        }

        h2 { margin-bottom: 1.5rem; font-size: 1.25rem; font-weight: 700; }

        .form-group { margin-bottom: 1.25rem; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(234, 75, 113, 0.15);
        }

        textarea { resize: vertical; min-height: 120px; }

        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-submit:disabled { background-color: #cbd5e1; cursor: not-allowed; }

        /* Grille de Résultats */
        .results-area { display: flex; flex-direction: column; gap: 1.5rem; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        /* Carte Image */
        .image-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease-out;
        }

        .image-wrapper {
            width: 100%;
            aspect-ratio: 1/1; /* Format carré standard citation */
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #f1f5f9;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* S'assure que toute l'image est visible */
            display: block;
        }

        .card-body { padding: 1rem; }

        .btn-download {
            display: block;
            width: 100%;
            text-align: center;
            background: #f1f5f9;
            color: var(--text-main);
            padding: 0.6rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .btn-download:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
        }

        /* États */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            background: #fff;
            border-radius: var(--border-radius);
            border: 2px dashed #cbd5e1;
            color: var(--text-muted);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid var(--primary-color);
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #334155;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        .toast.visible { transform: translateY(0); }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            Cotation
        </div>
    </header>

    <main>
        <!-- Formulaire -->
        <section class="control-panel">
            <h2>Créer une Citation</h2>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem;">
                Les données sont envoyées à l'API n8n pour générer les visuels.
            </p>
            
            <form id="cotationForm">
                <div class="form-group">
                    <label for="auteur">Auteur</label>
                    <input type="text" id="auteur" name="auteur" placeholder="Ex: Victor Hugo" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="citation">Citation</label>
                    <textarea id="citation" name="citation" placeholder="Tapez votre citation ici..." required></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">Envoyer et Générer</span>
                    <div class="loader" id="btnLoader"></div>
                </button>
            </form>
        </section>

        <!-- Résultats -->
        <section class="results-area">
            <div class="results-header">
                <h2>Résultats</h2>
                <span id="statusText" style="color: var(--text-muted); font-size: 0.9rem;"></span>
            </div>

            <div id="gridContainer" class="grid-container">
                <div class="empty-state">
                    <p>En attente de données...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast">Message notification</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('cotationForm');
            const gridContainer = document.getElementById('gridContainer');
            const submitBtn = document.getElementById('submitBtn');
            const btnLoader = document.getElementById('btnLoader');
            const btnText = document.querySelector('.btn-text');
            const statusText = document.getElementById('statusText');
            const toast = document.getElementById('toast');

            function download(base64) {
                const a = document.createElement("a");
                a.href = base64;
                a.download = `cotation-${Date.now()}.jpg`; // ou image.png
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            // URL du Webhook n8n
            const API_URL = 'https://n8n.foudroyant.fun/webhook-test/cotation';

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // 1. Préparation des données
                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());
                
                // 2. UI Loading
                setLoading(true);
                gridContainer.innerHTML = ''; // Nettoyer les anciens résultats
                
                try {
                    // 3. Envoi de la requête POST
                    // Note: FormData envoie automatiquement le header 'multipart/form-data'
                    // Si n8n attend du JSON, il faudrait changer le body en JSON.stringify(data)
                    // et ajouter le header 'Content-Type': 'application/json'.
                    // Ici on garde FormData comme suggéré par "formulaire permettant d'envoyer".
                    
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error(`Erreur serveur: ${response.status}`);
                    }

                    // 4. Réception de la réponse
                    const jsonResponse = await response.json();
                    console.log(jsonResponse)
                    
                    // 5. Traitement du tableau de Base64
                    // On s'attend à ce que jsonResponse soit un tableau ["base64...", "base64...", ...]
                    // Ou un objet contenant un tableau. On tente d'être robuste.
                    let imagesArray = [];

                    if (Array.isArray(jsonResponse)) {
                        imagesArray = [jsonResponse[0]["buffer"], jsonResponse[0]["story"], jsonResponse[0]["instagram"]];
                    } else if (jsonResponse.images && Array.isArray(jsonResponse.images)) {
                        imagesArray = jsonResponse.images;
                    } else if (jsonResponse.data && Array.isArray(jsonResponse.data)) {
                        imagesArray = jsonResponse.data;
                    } else {
                        console.error("Format de réponse inattendu:", jsonResponse);
                        throw new Error("Le serveur n'a pas renvoyé un tableau d'images valide.");
                    }

                    if (imagesArray.length === 0) {
                        throw new Error("Aucune image reçue.");
                    }

                    // 6. Affichage
                    renderImages(imagesArray);
                    showToast(`${imagesArray.length} image(s) reçue(s) avec succès !`);

                } catch (error) {
                    console.error(error);
                    showToast("Erreur: " + error.message);
                    gridContainer.innerHTML = `
                        <div class="empty-state" style="border-color: #ef4444; color: #ef4444;">
                            <p>Une erreur est survenue.</p>
                            <p style="font-size:0.8rem; margin-top:0.5rem;">${error.message}</p>
                            <p style="font-size:0.8rem; margin-top:0.5rem;">(Vérifiez la console F12 pour les détails CORS)</p>
                        </div>
                    `;
                } finally {
                    setLoading(false);
                }
            });

            // Fonction pour afficher les images
            function renderImages(base64Array) {
                statusText.innerText = `${base64Array.length} éléments`;
                
                base64Array.forEach((base64Str, index) => {
                    // Vérification et formatage du Base64
                    // Si la chaîne ne commence pas par "data:image...", on l'ajoute
                    let imgSrc = base64Str;
                    if (!base64Str.startsWith('data:image')) {
                        // On suppose PNG par défaut si le header manque
                        imgSrc = `data:image/png;base64,${base64Str}`;
                    }

                    const card = document.createElement('div');
                    card.className = 'image-card';
                    card.innerHTML = `
                        <div class="image-wrapper">
                            <img src="${imgSrc}" alt="Cotation générée ${index + 1}">
                        </div>
                        <div class="card-body">
                            <a onclick="download('${imgSrc}')" download="cotation-${Date.now()}-${index}.png" class="btn-download">
                                ⬇ Télécharger l'image
                            </a>
                        </div>
                    `;
                    gridContainer.appendChild(card);
                });
            }

            // Gestion de l'état Loading
            function setLoading(isLoading) {
                if (isLoading) {
                    submitBtn.disabled = true;
                    btnLoader.style.display = 'block';
                    btnText.style.opacity = '0.5';
                    statusText.innerText = "Génération en cours...";
                } else {
                    submitBtn.disabled = false;
                    btnLoader.style.display = 'none';
                    btnText.style.opacity = '1';
                }
            }

            // Affichage Toast
            function showToast(msg) {
                toast.innerText = msg;
                toast.classList.add('visible');
                setTimeout(() => {
                    toast.classList.remove('visible');
                }, 4000);
            }
        });


    </script>
</body>
</html>
